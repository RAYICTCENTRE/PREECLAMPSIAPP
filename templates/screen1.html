<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MotherCare - Pre-eclampsia Guardian</title>
    <style>
        /* Page Background */
        body {
            background-color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* The Phone Container */
        .container {
            padding-top: 30px;
            width: 360px;
            min-height: 640px;
            margin: 0 auto;
            border-radius: 24px;
            background-image: url('containerbackground.JPG');
            background-size: cover;
            background-position: center;
            border: 3px solid #f5bd9a; /* Orange border to match requested theme */
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Logo Animation (Blink) */
        .logo {
            display: block;
            margin: 10px auto;
            width: 200px;
            height: auto;
            animation: blink 2s linear infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Header Animation (Alternate Slide) */
        .header {
            color: #e67e22; /* Orange tint */
            padding: 10px 16px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            animation: alternateSlide 3s ease-in-out infinite alternate;
        }

        @keyframes alternateSlide {
            from { transform: translateX(-6px); }
            to { transform: translateX(6px); }
        }

        /* Mother Row (Side-by-Side) - NO SPACE BELOW */
        .mother-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 0; /* NO margin at bottom */
            padding: 0 16px;
        }

        .mother {
            width: 180px;
            height: auto;
            border-radius: 12px;
            display: block;
        }

        .mother-text {
            font-size: 11px; /* Smaller text */
            font-weight: bold;
            color: #d35400; /* Dark orange */
            line-height: 1.3;
            text-align: left;
            /* Force exactly 2 lines */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Button Section - NO top margin/padding, directly attached to image row */
        .login-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px 20px 20px; /* NO top padding - buttons touch image row */
            margin-top: 0; /* NO margin at top - directly attached */
        }

        .btn-login, .btn-signup {
            width: 100%;
            padding: 12px 0;
            border-radius: 25px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
            border: none;
        }

        /* LOGIN: White background with orange border (unchanged) */
        .btn-login {
            background-color: white;
            color: #ff8c42;
            border: 2px solid #ff8c42;
        }

        .btn-login:hover {
            background-color: #e67e22;
            color: white;
        }

        /* SIGNUP: Solid orange background (CHANGED) */
        .btn-signup {
            background-color: #ff8c42; /* Solid orange */
            color: white;
            border: none;
        }

        .btn-signup:hover {
            background-color: #e67e22; /* Darker orange on hover */
        }

        /* Small press effect */
        .btn-login:active, .btn-signup:active {
            transform: scale(0.97);
        }

        .notice {
            margin: 0 auto;
            padding: 16px 20px 20px 20px;
            text-align: center;
            font-size: 11px;
            color: #1e3a8a;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" class="logo" alt="MotherCare Logo" onerror="this.src='https://placehold.co/140x60/ff8c42/white?text=MotherCare'">
        <div class="header">Pre-eclampsia Guardian</div>

        <div class="mother-row">
            <img src="woman.png" class="mother" alt="Pregnant Woman" onerror="this.src='https://placehold.co/180x200/ff8c42/white?text=Pregnancy'">
            <div class="mother-text">
                Monitor your well-being during pregnancy.
            </div>
        </div>

        <!-- NO SPACE between mother-row and login-container -->
        <div class="login-container">
            <button class="btn-login" onclick="location.href='screen2.html'"><b>LOGIN</b></button>
            <button class="btn-signup" onclick="location.href='screen3.html'"><b>SIGN UP</b></button>
        </div>

        <div class="notice">
            Predicting Preeclampsia Risk Using AI
        </div>
    </div>

    <script>
        // Removed the conflicting JavaScript that was preventing navigation
        // The buttons now work directly with onclick events
        console.log("Page loaded - Login goes to screen2.html, Signup goes to screen3.html");
    </script>
</body>
</html>
