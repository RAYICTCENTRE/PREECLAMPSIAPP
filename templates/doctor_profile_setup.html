<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doctor Profile - MotherCare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fff5e8 0%, #ffe8d4 100%);
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .profile-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%);
            padding: 28px 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }

        .form-content {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 3px;
        }

        input[type="text"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fefcf8;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Phone Row */
        .phone-row {
            display: flex;
            gap: 12px;
        }

        .phone-row select {
            width: 35%;
        }

        .phone-row input {
            width: 65%;
        }

        /* File Upload */
        .file-upload {
            border: 2px dashed #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fefcf8;
        }

        .file-upload:hover {
            border-color: #e67e22;
            background: #fff5e8;
        }

        .file-upload input {
            display: none;
        }

        .file-upload-label {
            cursor: pointer;
            color: #e67e22;
            font-weight: 600;
        }

        .photo-preview {
            margin-top: 15px;
            text-align: center;
        }

        .photo-preview img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 60px;
            object-fit: cover;
            border: 3px solid #e67e22;
        }

        /* Message */
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #dcfce7;
            color: #16a34a;
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e67e22 0%, #f39c12 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(230,126,34,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(230,126,34,0.4);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        .link-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .link-buttons a {
            color: #e67e22;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .link-buttons a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .profile-container {
                border-radius: 24px;
            }
            
            .header {
                padding: 24px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .form-content {
                padding: 24px;
            }
            
            .phone-row {
                flex-direction: column;
                gap: 8px;
            }
            
            .phone-row select,
            .phone-row input {
                width: 100%;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .link-buttons {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="header">
        <h1>Doctor Profile</h1>
        <p>Complete your professional details</p>
    </div>

    <div class="form-content">
        <div id="message" class="message"></div>

        <form id="profileForm" enctype="multipart/form-data">
            <!-- Profile Photo -->
            <div class="form-group">
                <label>Profile Photo</label>
                <div class="file-upload" onclick="document.getElementById('photoInput').click()">
                    <input type="file" name="photo" id="photoInput" accept="image/*" style="display:none;" onchange="previewPhoto(this)">
                    <div class="file-upload-label">
                        📸 Click to upload or drag photo here
                    </div>
                    <div style="font-size:12px; color:#999; margin-top:8px;">
                        Recommended: Square image, max 2MB
                    </div>
                </div>
                <div class="photo-preview" id="photoPreview"></div>
            </div>

            <!-- Contact Information -->
            <div class="form-group">
                <label>Phone Number <span class="required">*</span></label>
                <div class="phone-row">
                    <select name="countryCode" id="countryCode" required>
                        <option value="+256">🇺🇬 Uganda (+256)</option>
                        <option value="+254">🇰🇪 Kenya (+254)</option>
                        <option value="+255">🇹🇿 Tanzania (+255)</option>
                        <option value="+211">🇸🇸 South Sudan (+211)</option>
                        <option value="+250">🇷🇼 Rwanda (+250)</option>
                        <option value="+243">🇨🇩 DR Congo (+243)</option>
                        <option value="+252">🇸🇴 Somalia (+252)</option>
                        <option value="+234">🇳🇬 Nigeria (+234)</option>
                        <option value="+251">🇪🇹 Ethiopia (+251)</option>
                        <option value="+1">🇺🇸 United States (+1)</option>
                        <option value="+44">🇬🇧 United Kingdom (+44)</option>
                        <option value="+27">🇿🇦 South Africa (+27)</option>
                        <option value="+91">🇮🇳 India (+91)</option>
                    </select>
                    <input type="tel" name="dContact" id="dContact" placeholder="Phone number" required>
                </div>
            </div>

            <!-- Qualifications -->
            <div class="form-group">
                <label>Qualifications <span class="required">*</span></label>
                <textarea name="qualifications" id="qualifications" placeholder="e.g., MBChB, Master in Obstetrics and Gynecology, PhD..." required></textarea>
            </div>

            <!-- Specialty -->
            <div class="form-group">
                <label>Specialty <span class="required">*</span></label>
                <input type="text" name="specialty" id="specialty" placeholder="e.g., Obstetrician, Gynecologist, General Practitioner" required>
            </div>

            <!-- Facility -->
            <div class="form-group">
                <label>Facility / Hospital <span class="required">*</span></label>
                <input type="text" name="facility" id="facility" placeholder="e.g., Mulago National Referral Hospital" required>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn btn-primary">Save Profile</button>
                <a href="doctor_dashboard.php" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

        <div class="link-buttons">
            <a href="screen1.html">← Back to Home</a>
            <a href="doctor_dashboard.php">Go to Dashboard →</a>
        </div>
    </div>
</div>

<script>
// Load existing doctor profile data
async function loadDoctorProfile() {
    try {
        const response = await fetch('get_doctor_profile.php');
        const data = await response.json();
        
        if (data.success && data.profile) {
            // Fill form with existing data
            if (data.profile.country_code) {
                document.getElementById('countryCode').value = data.profile.country_code;
            }
            if (data.profile.dcontact) {
                // Extract phone without country code
                const phone = data.profile.dcontact.replace(/^\+[0-9]+/, '');
                document.getElementById('dContact').value = phone;
            }
            document.getElementById('qualifications').value = data.profile.qualifications || '';
            document.getElementById('specialty').value = data.profile.specialty || '';
            document.getElementById('facility').value = data.profile.facility || '';
            
            // Show existing photo if any
            if (data.profile.photo_path) {
                document.getElementById('photoPreview').innerHTML = '<img src="' + data.profile.photo_path + '" alt="Profile Photo">';
            }
        }
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

function previewPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
        }
        reader.readAsDataURL(input.files[0]);
    }
}

// Handle form submission
document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const messageDiv = document.getElementById('message');
    
    try {
        const response = await fetch('save_doctor_profile.php', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            messageDiv.className = "message success";
            messageDiv.innerText = "✅ " + result.message;
            setTimeout(() => {
                window.location.href = 'doctor_dashboard.php';
            }, 1500);
        } else {
            messageDiv.className = "message error";
            messageDiv.innerText = "❌ " + result.message;
        }
    } catch (error) {
        messageDiv.className = "message error";
        messageDiv.innerText = "❌ Network error. Please try again.";
    }
});

// Load existing profile on page load
loadDoctorProfile();
</script>

</body>
</html>
